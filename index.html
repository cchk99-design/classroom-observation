<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>流動版-言語治療觀察表</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --primary: #2c3e50; --accent: #27ae60; --blue: #2980b9; 
            --bg: #f0f2f5; --card: #ffffff;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 0; background-color: var(--bg); color: #333;
        }

        /* 置頂工具欄 */
        .sticky-header {
            position: sticky; top: 0; z-index: 100;
            background: var(--primary); color: white;
            padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .stu-names-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; font-size: 12px; text-align: center; }
        .stu-names-bar div { background: rgba(255,255,255,0.2); padding: 4px; border-radius: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .main-container { padding: 15px; padding-bottom: 100px; }
        
        /* 基礎資料摺疊區 */
        details.info-section { background: var(--card); padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd; }
        summary { font-weight: bold; cursor: pointer; color: var(--primary); }

        /* 觀察項目卡片 */
        .item-card {
            background: var(--card); border-radius: 12px; padding: 15px; 
            margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 6px solid var(--blue);
        }
        .category-label { font-size: 12px; color: #7f8c8d; margin-bottom: 5px; }
        .item-question { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: var(--primary); }

        /* 三生評分區域 - 行動端垂直排列 */
        .scoring-row {
            display: grid; grid-template-columns: 1fr; gap: 15px;
        }
        /* iPad/電腦則橫向排列 */
        @media (min-width: 768px) {
            .scoring-row { grid-template-columns: 1fr 1fr 1fr; }
        }

        .student-score-unit { background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid #eee; }
        .stu-label { font-weight: bold; margin-bottom: 8px; display: block; border-bottom: 1px solid #ddd; padding-bottom: 3px; }

        /* 評分按鈕樣式 */
        .btn-group { display: flex; gap: 5px; margin-bottom: 8px; }
        .btn-group label { flex: 1; text-align: center; }
        .btn-group input { display: none; }
        .btn-group span {
            display: block; padding: 10px 0; background: #eee; border-radius: 6px; 
            cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .btn-group input:checked + span { background: var(--accent); color: white; }
        .btn-group input[value="0"]:checked + span { background: #e74c3c; }
        .btn-group input[value="1"]:checked + span { background: #f39c12; }

        .mobile-remark { width: 100%; border: 1px solid #ccc; border-radius: 6px; padding: 8px; font-size: 14px; box-sizing: border-box; }

        /* 浮動按鈕 */
        .fab-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; }
        .fab { 
            width: 56px; height: 56px; border-radius: 28px; border: none;
            color: white; font-size: 12px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1.2;
        }

        #export-temp-container { position: absolute; left: -9999px; background: white; width: 800px; }
    </style>
</head>
<body>

<div class="sticky-header no-print">
    <div class="header-top">
        <span style="font-weight: bold;">課室記錄表</span>
        <input type="date" id="mainDate" style="border-radius:4px; border:none; padding:4px;" onchange="autoSave()">
    </div>
    <div class="stu-names-bar">
        <div id="barA">學生 A</div>
        <div id="barB">學生 B</div>
        <div id="barC">學生 C</div>
    </div>
</div>

<div class="main-container no-print">
    <details class="info-section">
        <summary>設定學生姓名與活動</summary>
        <div style="padding-top:10px;">
            <div class="student-setup-unit" style="margin-bottom:15px;">
                <input type="text" id="nameA" placeholder="A 姓名" oninput="syncNames(); autoSave();" style="width:40%">
                <input type="text" id="actA" placeholder="A 活動內容" oninput="autoSave();" style="width:55%">
            </div>
            <div class="student-setup-unit" style="margin-bottom:15px;">
                <input type="text" id="nameB" placeholder="B 姓名" oninput="syncNames(); autoSave();" style="width:40%">
                <input type="text" id="actB" placeholder="B 活動內容" oninput="autoSave();" style="width:55%">
            </div>
            <div class="student-setup-unit">
                <input type="text" id="nameC" placeholder="C 姓名" oninput="syncNames(); autoSave();" style="width:40%">
                <input type="text" id="actC" placeholder="C 活動內容" oninput="autoSave();" style="width:55%">
            </div>
        </div>
    </details>

    <div id="dynamic-content"></div>
</div>

<div class="fab-container no-print">
    <button class="fab" style="background:#e74c3c" onclick="clearData()">清空</button>
    <button class="fab" style="background:var(--blue)" onclick="exportAsImage()">PNG</button>
    <button class="fab" style="background:var(--accent)" onclick="exportAsPDF()">PDF</button>
</div>

<div id="export-temp-container"></div>

<script>
    // 數據結構保持不變 (與之前完全相同)
    const sections = [
        { title: "（一）學習適應", sub: "【主題時間】 遵守規則及指令", items: ["能安坐", "能先舉手、後發言", "在合適時間才舉手發言或參與", "能持續地留心聆聽", "能合作並跟從老師指令"] },
        // ... (中間內容省略以節省篇幅，請保留你之前的完整 sections 陣列)
        { title: "（二）社交適應", sub: "【情緒表達、理解及調控】", items: ["表達情緒", "基礎情緒詞彙", "進階情緒詞彙", "情緒程度", "解釋成因", "理解別人情緒", "調控負面/正面情緒", "調控憤怒/緊張/焦慮", "調控興奮/不開心", "平復後重新參與"] }
    ];

    function initForm() {
        const wrap = document.getElementById('dynamic-content');
        sections.forEach((sec, sIdx) => {
            sec.items.forEach((item, iIdx) => {
                const id = `s${sIdx}i${iIdx}`;
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="category-label">${sec.title} - ${sec.sub}</div>
                    <div class="item-question">${item}</div>
                    <div class="scoring-row">
                        ${['A', 'B', 'C'].map(ch => `
                            <div class="student-score-unit">
                                <span class="stu-label dis${ch}">學生 ${ch}</span>
                                <div class="btn-group">
                                    <label><input type="radio" name="${id}_${ch}" value="0" onchange="autoSave()"><span>0</span></label>
                                    <label><input type="radio" name="${id}_${ch}" value="1" onchange="autoSave()"><span>1</span></label>
                                    <label><input type="radio" name="${id}_${ch}" value="2" onchange="autoSave()"><span>2</span></label>
                                </div>
                                <textarea class="mobile-remark" id="rem_${id}_${ch}" oninput="autoSave()" placeholder="備註..."></textarea>
                            </div>
                        `).join('')}
                    </div>
                `;
                wrap.appendChild(card);
            });
        });
        loadSavedData();
    }

    function syncNames() {
        ['A', 'B', 'C'].forEach(ch => {
            const val = document.getElementById('name' + ch).value || `學生 ${ch}`;
            document.querySelectorAll('.dis' + ch).forEach(el => el.innerText = val);
            document.getElementById('bar' + ch).innerText = val;
        });
    }

    // 自動儲存、載入、導出功能與之前相同，僅在 buildSummaryHTML 加入微調樣式
    function autoSave() {
        const data = {
            date: document.getElementById('mainDate').value,
            names: { A: document.getElementById('nameA').value, B: document.getElementById('nameB').value, C: document.getElementById('nameC').value },
            acts: { A: document.getElementById('actA').value, B: document.getElementById('actB').value, C: document.getElementById('actC').value },
            scores: {}, remarks: {}
        };
        document.querySelectorAll('input[type="radio"]:checked').forEach(rb => data.scores[rb.name] = rb.value);
        document.querySelectorAll('.mobile-remark').forEach(ta => data.remarks[ta.id] = ta.value);
        localStorage.setItem('sl_mobile_data', JSON.stringify(data));
    }

    function loadSavedData() {
        const saved = localStorage.getItem('sl_mobile_data');
        if (!saved) return;
        const data = JSON.parse(saved);
        document.getElementById('mainDate').value = data.date || "";
        ['A','B','C'].forEach(ch => {
            document.getElementById('name' + ch).value = data.names[ch] || "";
            document.getElementById('act' + ch).value = data.acts[ch] || "";
        });
        syncNames();
        for (let key in data.scores) {
            const rb = document.querySelector(`input[name="${key}"][value="${data.scores[key]}"]`);
            if (rb) rb.checked = true;
        }
        for (let id in data.remarks) {
            const ta = document.getElementById(id);
            if (ta) ta.value = data.remarks[id];
        }
    }

    function clearData() {
        if(confirm('確定清除？')) { localStorage.removeItem('sl_mobile_data'); location.reload(); }
    }

    // 導出邏輯與之前一致...
    function buildSummaryHTML() {
        const date = document.getElementById('mainDate').value || "未填寫";
        let html = `<div style="padding:20px; background:white; color:black; width:760px;">
                    <h2 style="text-align:center;">觀察記錄摘要</h2><p>日期：${date}</p><hr>`;
        ['A', 'B', 'C'].forEach(ch => {
            let table = "";
            sections.forEach((sec, sIdx) => {
                sec.items.forEach((item, iIdx) => {
                    const id = `s${sIdx}i${iIdx}_${ch}`;
                    const score = document.querySelector(`input[name="${id}"]:checked`)?.value;
                    const remark = document.getElementById(`rem_${id}`).value.trim();
                    if (score === "1" || remark !== "") {
                        table += `<tr><td>${sec.sub}<br>• ${item}</td><td>${score==="1" ? "<strong>【目標】</strong>" : ""}${remark}</td></tr>`;
                    }
                });
            });
            if (table) {
                html += `<h3>學生：${document.getElementById('name'+ch).value || ch}</h3>
                         <table border="1" style="width:100%; border-collapse:collapse;">${table}</table><br>`;
            }
        });
        return html + `</div>`;
    }

    function exportAsPDF() {
        document.getElementById('export-temp-container').innerHTML = buildSummaryHTML();
        window.print();
    }

    async function exportAsImage() {
        const container = document.getElementById('export-temp-container');
        container.innerHTML = buildSummaryHTML();
        const canvas = await html2canvas(container, { backgroundColor: "#ffffff", scale: 2 });
        const link = document.createElement('a');
        link.download = `記錄_${new Date().getTime()}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    }

    window.onload = initForm;
</script>

</body>
</html>
