<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>專業版-言語治療觀察記錄 (手機/iPad 優化)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --primary: #2c3e50; --accent: #27ae60; --blue: #2980b9; 
            --bg: #f0f2f5; --card: #ffffff;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 0; background-color: var(--bg); color: #333;
        }

        /* 置頂工具欄：包含導航選單 */
        .sticky-header {
            position: sticky; top: 0; z-index: 100;
            background: var(--primary); color: white;
            padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        
        /* 快速跳轉選單樣式 */
        .jump-menu {
            width: 100%; padding: 8px; margin-top: 5px; border-radius: 4px;
            background: #fff; color: #333; border: none; font-size: 14px;
        }

        .stu-names-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; font-size: 12px; text-align: center; margin-top: 8px;}
        .stu-names-bar div { background: rgba(255,255,255,0.2); padding: 4px; border-radius: 4px; }

        .main-container { padding: 15px; padding-bottom: 120px; }
        
        details.info-section { background: var(--card); padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd; }
        summary { font-weight: bold; cursor: pointer; padding: 5px; }

        /* 觀察卡片 */
        .item-card {
            background: var(--card); border-radius: 12px; padding: 15px; 
            margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 6px solid var(--blue);
        }
        .cat-tag { font-size: 11px; color: #fff; background: var(--blue); padding: 2px 8px; border-radius: 10px; display: inline-block; margin-bottom: 5px; }
        .sub-tag { font-size: 12px; color: #7f8c8d; display: block; margin-bottom: 5px; font-weight: bold; }
        .item-text { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: var(--primary); line-height: 1.4; }

        /* 評分區 */
        .scoring-row { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 768px) { .scoring-row { grid-template-columns: 1fr 1fr 1fr; } }

        .stu-unit { background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid #eee; }
        .stu-label { font-size: 13px; font-weight: bold; margin-bottom: 8px; display: block; color: var(--primary); }

        .btn-group { display: flex; gap: 5px; margin-bottom: 8px; }
        .btn-group label { flex: 1; }
        .btn-group input { display: none; }
        .btn-group span {
            display: block; padding: 12px 0; background: #eee; border-radius: 6px; 
            text-align: center; cursor: pointer; font-weight: bold;
        }
        .btn-group input:checked + span { background: var(--accent); color: white; }
        .btn-group input[value="1"]:checked + span { background: #f39c12; }
        .btn-group input[value="0"]:checked + span { background: #e74c3c; }

        .rem-box { width: 100%; border: 1px solid #ccc; border-radius: 6px; padding: 8px; font-size: 14px; box-sizing: border-box; resize: none; }

        /* 浮動按鈕 */
        .fab-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 999; }
        .fab { width: 56px; height: 56px; border-radius: 28px; border: none; color: white; cursor: pointer; font-size: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-weight: bold;}

        /* 隱藏導出區 */
        #export-temp { position: absolute; left: -9999px; background: white; width: 800px; padding: 20px; }
        .ex-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .ex-table th, .ex-table td { border: 1px solid #333; padding: 8px; text-align: left; }
    </style>
</head>
<body>

<div class="sticky-header no-print">
    <div class="header-top">
        <span>語言觀察記錄表</span>
        <input type="date" id="mainDate" onchange="autoSave()">
    </div>
    <select class="jump-menu" onchange="location.href='#'+this.value">
        <option value="">快速跳轉至範疇...</option>
        <optgroup label="（一）學習適應">
            <option value="cat0">遵守規則及指令</option>
            <option value="cat1">上課反應</option>
            <option value="cat2">朋輩討論</option>
            <option value="cat3">獨立完成工作</option>
            <option value="cat4">轉換及靈活性</option>
        </optgroup>
        <optgroup label="（二）社交適應">
            <option value="cat5">語言溝通</option>
            <option value="cat6">非語言訊息</option>
            <option value="cat7">語言用途</option>
            <option value="cat8">對話開展/完結</option>
            <option value="cat9">調節對話內容</option>
            <option value="cat10">維持對話互動</option>
            <option value="cat11">解讀別人想法</option>
            <option value="cat12">社交思考調整</option>
            <option value="cat13">問題解決</option>
            <option value="cat14">社交禮儀</option>
            <option value="cat15">友善行為</option>
            <option value="cat16">參與遊戲</option>
            <option value="cat17">遊戲行為</option>
            <option value="cat18">處理衝突分歧</option>
            <option value="cat19">情緒表達/調控</option>
        </optgroup>
    </select>
    <div class="stu-names-bar">
        <div id="barA">學生 A</div>
        <div id="barB">學生 B</div>
        <div id="barC">學生 C</div>
    </div>
</div>

<div class="main-container no-print">
    <details class="info-section">
        <summary>兒童姓名及活動內容</summary>
        <div style="padding:10px 0;">
            <input type="text" id="nameA" placeholder="A 姓名" oninput="syncNames(); autoSave();" style="width:30%">
            <input type="text" id="actA" placeholder="A 活動內容" oninput="autoSave();" style="width:65%; margin-bottom:10px;">
            <input type="text" id="nameB" placeholder="B 姓名" oninput="syncNames(); autoSave();" style="width:30%">
            <input type="text" id="actB" placeholder="B 活動內容" oninput="autoSave();" style="width:65%; margin-bottom:10px;">
            <input type="text" id="nameC" placeholder="C 姓名" oninput="syncNames(); autoSave();" style="width:30%">
            <input type="text" id="actC" placeholder="C 活動內容" oninput="autoSave();" style="width:65%;">
        </div>
    </details>

    <div id="form-content"></div>
</div>

<div class="fab-container no-print">
    <button class="fab" style="background:#e74c3c" onclick="clearAll()">清空</button>
    <button class="fab" style="background:var(--blue)" onclick="doPNG()">PNG</button>
    <button class="fab" style="background:var(--accent)" onclick="doPDF()">PDF</button>
</div>

<div id="export-temp"></div>

<script>
    const sections = [
        { title: "（一）學習適應", sub: "【主題時間】 遵守規則及指令", items: ["能安坐", "能先舉手、後發言", "在合適時間才舉手發言或參與", "能持續地留心聆聽", "能合作並跟從老師指令"] },
        { title: "（一）學習適應", sub: "【主題時間】 上課時給予反應", items: ["聽課時，會眼望老師及點頭表示明白", "被叫名字提問時，會嘗試作出回應", "能主動舉手回答老師問題"] },
        { title: "（一）學習適應", sub: "【主題時間】 與朋輩討論", items: ["主動積極參與於與朋輩的討論中", "知道老師現在指示討論題目", "能專心聆聽伙伴分享", "以點頭或說話回應", "分享想法或意見", "內容有條理與主題相關", "身體語言(眼神/距離)", "語言(聲量/語氣)", "向伙伴提出問題"] },
        { title: "（一）學習適應", sub: "【分組時間／功課時間】 獨立完成工作", items: ["自發地開展工作", "獨立地按指示完成工作", "持續專注地工作"] },
        { title: "（一）學習適應", sub: "【分組時間／功課時間】 轉換及靈活性", items: ["分辨重要性及先後次序", "按指令加快或放下工作", "接受流程規則改變", "自行轉換活動"] },
        { title: "（二）社交適應", sub: "【語言及非語言溝通】 恰當運用語言", items: ["清晰具體表達", "恰當語速", "恰當聲量", "風格自然(避免只顧自己話題)"] },
        { title: "（二）社交適應", sub: "【語言及非語言溝通】 理解及運用非語言訊息", items: ["眼神接觸", "聆聽時點頭", "社交距離", "動作姿勢及表情", "解讀別人含意"] },
        { title: "（二）社交適應", sub: "【語言及非語言溝通】 運用語言用途", items: ["提出要求", "敘述事情", "解釋事物", "分享想法", "提出意見", "提出問題"] },
        { title: "（二）社交適應", sub: "【對話技巧】 開展、加入及完結對話", items: ["主動交談", "不同話題", "適時加入", "恰當完結"] },
        { title: "（二）社交適應", sub: "【對話技巧】 調節對話內容", items: ["重複或澄清", "根據反應調整內容行為"] },
        { title: "（二）社交適應", sub: "【對話技巧】 維持對話互動", items: ["留心聆聽", "回應回答", "輪流說話", "頻次恰當", "不離題", "維持對話資料", "提出問題", "要求澄清", "轉換話題"] },
        { title: "（二）社交適應", sub: "【社交思考及解難】 解讀別人想法", items: ["觀點感受", "理解意圖", "明白行為影響形象"] },
        { title: "（二）社交適應", sub: "【社交思考及解難】 社交思考調整", items: ["就反應調整行為", "情緒/語言/非語言調整", "場合預期行為"] },
        { title: "（二）社交適應", sub: "【社交思考及解難】 問題解決", items: ["處理過失/不如意", "分辨問題大小", "考慮後果", "指出困難", "尋求幫助", "解決方法"] },
        { title: "（二）社交適應", sub: "【友善行為】 社交禮儀", items: ["友好表情", "打招呼", "道歉", "禮貌字詞", "回應讚美", "反對或拒絕"] },
        { title: "（二）社交適應", sub: "【友善行為】 友善對待別人", items: ["鼓勵讚美", "合情理投訴", "處理打擾", "表達關心", "幫助安慰", "分享歡樂"] },
        { title: "（二）社交適應", sub: "【遊戲活動】 參與遊戲", items: ["接受加入", "合宜加入", "邀請朋輩", "完結離開", "多樣興趣"] },
        { title: "（二）社交適應", sub: "【遊戲活動】 遊戲行為", items: ["運用物品", "分享", "輪流", "守規", "假想遊戲", "妥協協商", "面對失敗"] },
        { title: "（二）社交適應", sub: "【處理分歧衝突】", items: ["察覺分歧", "妥協", "協商共識", "解釋優劣", "公平決定", "輪流作主", "融合意見", "合宜拒絕"] },
        { title: "（二）社交適應", sub: "【情緒表達、理解及調控】", items: ["表達情緒", "基礎詞彙", "進階詞彙", "程度表達", "解釋成因", "理解別人情緒", "調控負面/正面", "調控憤怒/緊張/焦慮/失望/興奮", "平復後參與"] }
    ];

    function buildForm() {
        const wrap = document.getElementById('form-content');
        sections.forEach((sec, sIdx) => {
            // 為每個子類別添加錨點 id 以便跳轉
            const anchor = document.createElement('div');
            anchor.id = `cat${sIdx}`;
            wrap.appendChild(anchor);

            sec.items.forEach((item, iIdx) => {
                const id = `s${sIdx}i${iIdx}`;
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="cat-tag">${sec.title}</div>
                    <div class="sub-tag">${sec.sub}</div>
                    <div class="item-text">${item}</div>
                    <div class="scoring-row">
                        ${['A', 'B', 'C'].map(ch => `
                            <div class="stu-unit">
                                <span class="stu-label dis${ch}">學生 ${ch}</span>
                                <div class="btn-group">
                                    <label><input type="radio" name="${id}_${ch}" value="0" onchange="autoSave()"><span>0</span></label>
                                    <label><input type="radio" name="${id}_${ch}" value="1" onchange="autoSave()"><span>1</span></label>
                                    <label><input type="radio" name="${id}_${ch}" value="2" onchange="autoSave()"><span>2</span></label>
                                </div>
                                <textarea class="rem-box" id="rem_${id}_${ch}" oninput="autoSave()" placeholder="備註..."></textarea>
                            </div>
                        `).join('')}
                    </div>
                `;
                wrap.appendChild(card);
            });
        });
        loadData();
    }

    function syncNames() {
        ['A', 'B', 'C'].forEach(ch => {
            const n = document.getElementById('name'+ch).value || '學生'+ch;
            document.querySelectorAll('.dis'+ch).forEach(e => e.innerText = n);
            document.getElementById('bar'+ch).innerText = n;
        });
    }

    function autoSave() {
        const save = {
            d: document.getElementById('mainDate').value,
            n: { A: document.getElementById('nameA').value, B: document.getElementById('nameB').value, C: document.getElementById('nameC').value },
            a: { A: document.getElementById('actA').value, B: document.getElementById('actB').value, C: document.getElementById('actC').value },
            s: {}, r: {}
        };
        document.querySelectorAll('input:checked').forEach(i => save.s[i.name] = i.value);
        document.querySelectorAll('.rem-box').forEach(t => save.r[t.id] = t.value);
        localStorage.setItem('sl_v3_data', JSON.stringify(save));
    }

    function loadData() {
        const raw = localStorage.getItem('sl_v3_data');
        if (!raw) return;
        const data = JSON.parse(raw);
        document.getElementById('mainDate').value = data.d || "";
        ['A','B','C'].forEach(ch => {
            document.getElementById('name'+ch).value = data.n[ch] || "";
            document.getElementById('act'+ch).value = data.a[ch] || "";
        });
        syncNames();
        for (let k in data.s) {
            const el = document.querySelector(`input[name="${k}"][value="${data.s[k]}"]`);
            if (el) el.checked = true;
        }
        for (let k in data.r) {
            const el = document.getElementById(k);
            if (el) el.value = data.r[k];
        }
    }

    function clearAll() { if(confirm('確定清除？')) { localStorage.removeItem('sl_v3_data'); location.reload(); } }

    function getSummary() {
        const date = document.getElementById('mainDate').value || "未填日期";
        let h = `<div style="padding:20px; width:750px; background:white;"><h2>觀察記錄摘要</h2><p>日期：${date}</p><hr>`;
        ['A','B','C'].forEach(ch => {
            let rows = "";
            sections.forEach((sec, sIdx) => {
                sec.items.forEach((item, iIdx) => {
                    const id = `s${sIdx}i${iIdx}_${ch}`;
                    const sc = document.querySelector(`input[name="${id}"]:checked`)?.value;
                    const rm = document.getElementById(`rem_${id}`).value.trim();
                    if (sc === "1" || rm !== "") {
                        rows += `<tr><td>${sec.sub}<br>• ${item}</td><td>${sc==="1"?"<b>【目標】</b>":""}${rm}</td></tr>`;
                    }
                });
            });
            if (rows) {
                h += `<h3>學生：${document.getElementById('name'+ch).value || ch}</h3>
                      <p>活動：${document.getElementById('act'+ch).value || "---"}</p>
                      <table class="ex-table"><tr><th>範疇項目</th><th>記錄</th></tr>${rows}</table><br>`;
            }
        });
        return h + `</div>`;
    }

    function doPDF() { document.getElementById('export-temp').innerHTML = getSummary(); window.print(); }

    async function doPNG() {
        const t = document.getElementById('export-temp');
        t.innerHTML = getSummary();
        const cvs = await html2canvas(t, { scale: 2 });
        const a = document.createElement('a');
        a.download = `觀察記錄.png`;
        a.href = cvs.toDataURL();
        a.click();
    }

    window.onload = buildForm;
</script>

</body>
</html>
